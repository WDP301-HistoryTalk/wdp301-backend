name: Deploy Express Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Di chuyển vào thư mục code Express đang chạy trong Docker
            cd /home/minhtringuyen/SWD392_FinalProject_HistoryTalk/Source-code/SWD392_FinalProject_HistoryTalk/wdp301-backend
            
            # 2. Reset và Kéo code mới nhất từ nhánh main
            git reset --hard HEAD
            git pull origin main
            
            # 3. Di chuyển ra thư mục chứa file docker-compose.prod.yml
            cd ../../../
            
            # 4. Rebuild và chạy lại riêng container express-backend
            docker compose -f docker-compose.prod.yml up -d --build express-backend
            
            # 5. Dọn dẹp các image cũ lơ lửng để tránh đầy ổ cứng
            docker image prune -f
