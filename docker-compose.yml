services:
  mongo:
    image: mongo:7
    container_name: wdp301_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: wdp301_historytalk

  # Optional DB admin UI — run with: docker compose --profile tools up
  mongo-express:
    image: mongo-express:latest
    container_name: wdp301_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    profiles:
      - tools

volumes:
  mongo_data:
